<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <title>ECHO</title>
    <meta name="description" content="Derinliklerdeki sinyalini yönlendir ve engellerden kaçın - Designed by MSTYLDRM">
    <meta name="author" content="MSTYLDRM">

    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon-180x180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="apple-touch-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="120x120" href="apple-touch-icon-120x120.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ECHO">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#001122">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="format-detection" content="telephone=no">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000510;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #gameContainer {
            width: 100%;
            height: 100%;
            background: #001122;
            position: relative;
            overflow: hidden;
        }

        #screen {
            width: 100%;
            height: 100%;
            background: #000d1a;
            position: relative;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        #screen::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,255,136,0.03) 0px,
                rgba(0,255,136,0.03) 1px,
                transparent 1px,
                transparent 3px
            );
            pointer-events: none;
            z-index: 10;
        }

        #screen::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(
                ellipse at center,
                transparent 0%,
                rgba(0,0,0,0.4) 70%,
                rgba(0,0,0,0.8) 100%
            );
            pointer-events: none;
            z-index: 11;
        }

        #ui {
            position: absolute;
            top: max(10px, env(safe-area-inset-top));
            left: max(15px, env(safe-area-inset-left));
            right: max(15px, env(safe-area-inset-right));
            display: flex;
            justify-content: space-between;
            color: #00ff88;
            font-size: clamp(10px, 3.5vw, 14px);
            font-weight: bold;
            z-index: 20;
            text-shadow: 0 0 10px rgba(0,255,136,0.8);
            pointer-events: none;
            letter-spacing: 2px;
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,13,26,0.95);
            z-index: 30;
            color: #00ff88;
            padding: 20px;
        }

        .logo {
            width: min(120px, 30vw);
            height: min(120px, 30vw);
            margin-bottom: 30px;
            filter: drop-shadow(0 0 20px rgba(0,255,136,0.6));
        }

        h1 {
            font-size: clamp(36px, 12vw, 56px);
            letter-spacing: 15px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0,255,136,0.8);
            color: #00ff88;
        }

        .blink {
            animation: blink 1.5s infinite;
            font-size: clamp(12px, 4vw, 16px);
            margin-top: 40px;
            letter-spacing: 3px;
            color: #00cc6a;
            text-align: center;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; text-shadow: 0 0 10px rgba(0,255,136,0.8); }
            51%, 100% { opacity: 0.3; text-shadow: none; }
        }

        /* Oyun Bitti Ekranı - Yeni Tasarım */
        .game-over-title {
            font-size: clamp(20px, 6vw, 28px);
            color: #ff4444;
            text-shadow: 0 0 30px rgba(255,68,68,0.8);
            letter-spacing: 4px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .final-score-big {
            font-size: clamp(64px, 20vw, 120px);
            color: #00ff88;
            text-shadow: 0 0 40px rgba(0,255,136,0.9);
            letter-spacing: 8px;
            font-weight: bold;
            line-height: 1;
            margin: 10px 0;
        }

        .high-score-display {
            font-size: clamp(14px, 4vw, 18px);
            color: #00cc6a;
            letter-spacing: 3px;
            margin-top: 15px;
            opacity: 0.9;
        }

        .hidden {
            display: none !important;
        }

        #controls {
            position: absolute;
            bottom: max(40px, env(safe-area-inset-bottom) + 20px);
            left: max(20px, env(safe-area-inset-left));
            right: max(20px, env(safe-area-inset-right));
            display: flex;
            justify-content: space-between;
            z-index: 25;
            pointer-events: none;
        }

        .control-btn {
            width: clamp(70px, 20vw, 90px);
            height: clamp(70px, 20vw, 90px);
            border-radius: 50%;
            background: rgba(0,255,136,0.08);
            border: 2px solid rgba(0,255,136,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.05s;
            position: relative;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 20px rgba(0,255,136,0.1);
        }

        .control-btn:active, .control-btn.active {
            background: rgba(0,255,136,0.25);
            transform: scale(0.9);
            border-color: rgba(0,255,136,0.8);
            box-shadow: 0 0 30px rgba(0,255,136,0.4);
        }

        .control-btn::before {
            content: '';
            width: 0;
            height: 0;
            border-style: solid;
            filter: drop-shadow(0 0 5px rgba(0,255,136,0.8));
        }

        #btnUp::before {
            border-width: 0 12px 20px 12px;
            border-color: transparent transparent #00ff88 transparent;
            margin-top: -3px;
        }

        #btnDown::before {
            border-width: 20px 12px 0 12px;
            border-color: #00ff88 transparent transparent transparent;
            margin-top: 3px;
        }

        .control-label {
            position: absolute;
            bottom: -25px;
            font-size: clamp(8px, 2.5vw, 10px);
            color: #00cc6a;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .instructions {
            margin-top: 30px;
            font-size: clamp(11px, 3.5vw, 14px);
            text-align: center;
            line-height: 2;
            opacity: 0.7;
            letter-spacing: 1px;
            color: #00cc6a;
        }

        .credits-bottom {
            position: absolute;
            bottom: max(5px, env(safe-area-inset-bottom));
            left: 0;
            right: 0;
            text-align: center;
            font-size: clamp(7px, 2vw, 9px);
            color: #003322;
            letter-spacing: 2px;
            z-index: 35;
            pointer-events: none;
            font-weight: normal;
            opacity: 0.6;
        }

        #touchOverlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 140px;
            z-index: 24;
            display: none;
        }

        .playing #touchOverlay {
            display: block;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="screen">
            <canvas id="gameCanvas"></canvas>
            <div id="ui">
                <span>SKOR: <span id="score">0</span></span>
                <span>REKOR: <span id="best">0</span></span>
            </div>
            <div id="touchOverlay"></div>
            <div id="controls">
                <div class="control-btn" id="btnUp">
                    <span class="control-label">YUKARI</span>
                </div>
                <div class="control-btn" id="btnDown">
                    <span class="control-label">AŞAĞI</span>
                </div>
            </div>
            <div class="credits-bottom">DESIGNED BY MSTYLDRM</div>
            <div id="startScreen">
                <svg class="logo" viewBox="0 0 100 100">
                    <rect width="100" height="100" fill="#001122" rx="10"/>
                    <circle cx="50" cy="50" r="6" fill="#00ff88"/>
                    <circle cx="50" cy="50" r="20" fill="none" stroke="#00ff88" stroke-width="2.5"/>
                    <circle cx="50" cy="50" r="34" fill="none" stroke="#00ff88" stroke-width="1.8" opacity="0.7"/>
                    <circle cx="50" cy="50" r="46" fill="none" stroke="#00ff88" stroke-width="1.2" opacity="0.4"/>
                </svg>
                <h1>ECHO</h1>
                <div style="font-size: clamp(10px, 3vw, 12px); opacity: 0.6; letter-spacing: 4px; color: #00cc6a;">DERİNLİK: 0m</div>
                <div class="blink">BAŞLAMAK İÇİN DOKUN</div>
                <div class="instructions">
                    BUTONLARA BASILI TUT<br>
                    SİNYALİ YÖNLENDİR<br>
                    ENGELLERDEN KAÇIN
                </div>
            </div>
            <div id="gameOverScreen" class="hidden">
                <div class="game-over-title">SİNYAL KAYBOLDU</div>
                <div class="final-score-big" id="finalScoreBig">0</div>
                <div class="high-score-display" id="highScoreDisplay">REKOR: 0</div>
                <div class="blink" style="margin-top: 50px;">TEKRAR İÇİN DOKUN</div>
            </div>
        </div>
    </div>

    <script>
        // Game by MSTYLDRM - 2026
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreBig = document.getElementById('finalScoreBig');
        const highScoreDisplay = document.getElementById('highScoreDisplay');
        const btnUp = document.getElementById('btnUp');
        const btnDown = document.getElementById('btnDown');
        const gameContainer = document.getElementById('gameContainer');

        let gameState = 'start';
        let score = 0;
        let bestScore = 0;

        try {
            bestScore = parseInt(localStorage.getItem('echo_best')) || 0;
        } catch(e) {
            bestScore = 0;
        }
        bestEl.textContent = bestScore;

        function resize() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        resize();

        const signal = {
            x: 0,
            y: 0,
            radius: 6,
            targetY: 0,
            speed: 0,
            trail: []
        };

        let obstacles = [];
        let particles = [];
        let frame = 0;
        let gameSpeed = 2.5;
        let currentGap = 180;
        let lastObstacleX = 0;
        let difficultyLevel = 0;
        let gridOffset = 0;

        let isUpPressed = false;
        let isDownPressed = false;

        const COLOR_BG = '#000d1a';
        const COLOR_FG = '#00ff88';
        const COLOR_FG_DIM = '#00cc6a';
        const COLOR_FG_FAINT = '#006644';
        const COLOR_GRID = '#002233';

        // Dalga çemberleri için ahenkli animasyon
        let ringPhase = 0;

        function updateDifficulty() {
            const targetLevel = Math.floor(score / 10);
            if (targetLevel > difficultyLevel) {
                difficultyLevel = targetLevel;
                gameSpeed += 0.4;
                currentGap = Math.max(85, 180 - (difficultyLevel * 12));
            }
        }

        function init() {
            signal.x = canvas.width * 0.15;
            signal.y = canvas.height / 2;
            signal.targetY = signal.y;
            signal.speed = 0;
            signal.trail = [];
            obstacles = [];
            particles = [];
            score = 0;
            frame = 0;
            gameSpeed = 2.5;
            currentGap = 180;
            lastObstacleX = canvas.width + 50;
            difficultyLevel = 0;
            ringPhase = 0;
            isUpPressed = false;
            isDownPressed = false;

            scoreEl.textContent = '0';

            spawnObstacle(canvas.width + 100);
            spawnObstacle(lastObstacleX + currentGap);
            spawnObstacle(lastObstacleX + currentGap);
        }

        function spawnObstacle(x) {
            const gapHeight = 85 + Math.random() * 45;
            // %10 limit - ekranın %10'u üstten ve %10'u alttan kapalı
            const minY = canvas.height * 0.10;
            const maxY = canvas.height - gapHeight - canvas.height * 0.10;
            const gapY = minY + Math.random() * (maxY - minY);

            obstacles.push({
                x: x,
                gapY: gapY,
                gapHeight: gapHeight,
                width: Math.max(14, canvas.width * 0.035),
                passed: false,
                waves: []
            });

            lastObstacleX = x;
        }

        function createParticle(x, y, type) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 3,
                vy: (Math.random() - 0.5) * 3,
                life: 20 + Math.random() * 10,
                type: type
            });
        }

        function update() {
            if (gameState !== 'playing') return;

            frame++;
            ringPhase += 0.08;  // Düzenli dalga hızı
            gridOffset -= gameSpeed;

            // Tuş kontrolü - sürekli basılı tutma
            const moveSpeed = canvas.height * 0.014;
            if (isUpPressed) {
                signal.targetY -= moveSpeed;
            }
            if (isDownPressed) {
                signal.targetY += moveSpeed;
            }

            signal.targetY = Math.max(signal.radius + 10, Math.min(canvas.height - signal.radius - 10, signal.targetY));

            const diff = signal.targetY - signal.y;
            signal.speed += diff * 0.12;
            signal.speed *= 0.85;
            signal.y += signal.speed;

            if (frame % 2 === 0) {
                signal.trail.push({x: signal.x, y: signal.y, age: 0});
            }
            signal.trail.forEach(t => t.age++);
            signal.trail = signal.trail.filter(t => t.age < 12);

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
            });
            particles = particles.filter(p => p.life > 0);

            obstacles.forEach(obs => {
                obs.x -= gameSpeed;

                if (frame % 8 === 0) {
                    obs.waves.push({x: 0, width: 0, opacity: 0.8});
                }

                obs.waves.forEach(w => {
                    w.x -= gameSpeed;
                    w.width += 2.5;
                    w.opacity -= 0.04;
                });
                obs.waves = obs.waves.filter(w => w.opacity > 0);

                if (!obs.passed) {
                    const signalLeft = signal.x - signal.radius;
                    const signalRight = signal.x + signal.radius;
                    const signalTop = signal.y - signal.radius;
                    const signalBottom = signal.y + signal.radius;

                    const obsLeft = obs.x;
                    const obsRight = obs.x + obs.width;
                    const gapTop = obs.gapY;
                    const gapBottom = obs.gapY + obs.gapHeight;

                    if (signalRight > obsLeft && signalLeft < obsRight) {
                        if (signalTop < gapTop || signalBottom > gapBottom) {
                            gameOver();
                            return;
                        }
                    }

                    if (obsRight < signalLeft) {
                        obs.passed = true;
                        score++;
                        updateDifficulty();
                        scoreEl.textContent = score;
                    }
                }
            });

            const lastObs = obstacles[obstacles.length - 1];
            if (lastObs && lastObs.x < canvas.width - currentGap + 50) {
                spawnObstacle(canvas.width + 50);
            }

            obstacles = obstacles.filter(obs => obs.x > -50);
        }

        function draw() {
            ctx.fillStyle = COLOR_BG;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid
            ctx.strokeStyle = COLOR_GRID;
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.4;

            const gridSize = Math.max(30, canvas.width * 0.08);
            const offset = gridOffset % gridSize;

            for (let x = offset; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.globalAlpha = 0.2 + (y / canvas.height) * 0.3;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            ctx.globalAlpha = 1;

            // Depth lines
            for (let i = 0; i < 5; i++) {
                const y = (frame * 0.5 + i * (canvas.height / 5)) % canvas.height;
                ctx.strokeStyle = COLOR_FG_FAINT;
                ctx.globalAlpha = 0.1 * (1 - y / canvas.height);
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
            ctx.globalAlpha = 1;

            // Obstacles
            obstacles.forEach(obs => {
                obs.waves.forEach(w => {
                    ctx.strokeStyle = COLOR_FG;
                    ctx.globalAlpha = w.opacity * 0.5;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(obs.x + w.x, obs.gapY);
                    ctx.lineTo(obs.x + w.x + w.width, obs.gapY);
                    ctx.moveTo(obs.x + w.x, obs.gapY + obs.gapHeight);
                    ctx.lineTo(obs.x + w.x + w.width, obs.gapY + obs.gapHeight);
                    ctx.stroke();
                });
                ctx.globalAlpha = 1;

                const topGradient = ctx.createLinearGradient(0, 0, 0, obs.gapY);
                topGradient.addColorStop(0, 'rgba(0, 255, 136, 0.05)');
                topGradient.addColorStop(0.4, COLOR_FG);
                topGradient.addColorStop(1, COLOR_FG);

                const bottomStart = obs.gapY + obs.gapHeight;
                const bottomGradient = ctx.createLinearGradient(0, bottomStart, 0, canvas.height);
                bottomGradient.addColorStop(0, COLOR_FG);
                bottomGradient.addColorStop(0.6, COLOR_FG);
                bottomGradient.addColorStop(1, 'rgba(0, 255, 136, 0.05)');

                ctx.fillStyle = topGradient;
                ctx.shadowBlur = 10;
                ctx.shadowColor = COLOR_FG;
                ctx.fillRect(obs.x, 0, obs.width, obs.gapY);

                ctx.fillStyle = bottomGradient;
                ctx.fillRect(obs.x, bottomStart, obs.width, canvas.height - bottomStart);
                ctx.shadowBlur = 0;

                ctx.fillStyle = COLOR_BG;
                ctx.globalAlpha = 0.3;
                const detailSize = Math.max(2, canvas.width * 0.005);
                for (let i = 4; i < obs.gapY - 4; i += 5) {
                    if (i % 10 === 4) {
                        ctx.fillRect(obs.x + 3, i, obs.width - 6, detailSize);
                    }
                }
                for (let i = bottomStart + 4; i < canvas.height - 4; i += 5) {
                    if (i % 10 === 4) {
                        ctx.fillRect(obs.x + 3, i, obs.width - 6, detailSize);
                    }
                }
                ctx.globalAlpha = 1;
            });

            // Particles
            particles.forEach(p => {
                ctx.fillStyle = COLOR_FG;
                ctx.globalAlpha = (p.life / 30) * 0.8;
                const size = p.type === 'explode' ? 4 : 2;
                ctx.fillRect(Math.floor(p.x), Math.floor(p.y), size, size);
            });
            ctx.globalAlpha = 1;

            // Signal trail
            signal.trail.forEach((t, i) => {
                ctx.fillStyle = COLOR_FG;
                ctx.globalAlpha = (1 - t.age / 12) * 0.6;
                const size = Math.floor(6 - (t.age / 12) * 4);
                ctx.fillRect(Math.floor(t.x - size/2), Math.floor(t.y - size/2), size, size);
            });
            ctx.globalAlpha = 1;

            // Signal body
            const pulse = Math.sin(frame * 0.25) * 2;
            ctx.fillStyle = COLOR_FG;
            ctx.shadowBlur = 20;
            ctx.shadowColor = COLOR_FG;
            ctx.beginPath();
            ctx.arc(signal.x, signal.y, signal.radius + pulse * 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(signal.x - 1, signal.y - 1, 2.5, 0, Math.PI * 2);
            ctx.fill();

            // AHENKLİ Dalga çemberleri - düzenli sinüs dalgası
            ctx.strokeStyle = COLOR_FG;
            ctx.lineWidth = 2.5;

            // 3 dalga, her biri 120 derece (2π/3) faz farklı
            const baseRadius = signal.radius + 8;
            const maxRadius = canvas.width * 0.12;

            for (let i = 0; i < 3; i++) {
                // Her dalga için faz hesabı - düzenli periyot
                const phase = (ringPhase + (i * Math.PI * 2 / 3)) % (Math.PI * 2);
                // Sinüs fonksiyonu ile 0-1 arası değer
                const normalized = (Math.sin(phase) + 1) / 2;
                const ringRadius = baseRadius + (normalized * maxRadius);
                const alpha = 0.3 + (normalized * 0.7);  // Merkeze yakın opak, uzakta soluk

                ctx.globalAlpha = alpha;
                ctx.shadowBlur = 15;
                ctx.shadowColor = COLOR_FG;
                ctx.beginPath();
                ctx.arc(signal.x, signal.y, ringRadius, 0, Math.PI * 2);
                ctx.stroke();
            }
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;

            // Scanline
            const scanY = (frame * 3) % (canvas.height + 100) - 50;
            ctx.strokeStyle = COLOR_FG;
            ctx.globalAlpha = 0.12;
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, scanY);
            ctx.lineTo(canvas.width, scanY);
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameState = 'gameover';
            gameContainer.classList.remove('playing');

            for (let i = 0; i < 30; i++) {
                createParticle(signal.x, signal.y, 'explode');
            }

            // Yeni oyun bitti ekranı
            finalScoreBig.textContent = score;
            if (score > bestScore) {
                bestScore = score;
                try {
                    localStorage.setItem('echo_best', bestScore);
                } catch(e) {}
                bestEl.textContent = bestScore;
                highScoreDisplay.textContent = 'YENİ REKOR!';
                highScoreDisplay.style.color = '#ffaa00';
            } else {
                highScoreDisplay.textContent = 'REKOR: ' + bestScore;
                highScoreDisplay.style.color = '#00cc6a';
            }

            gameOverScreen.classList.remove('hidden');
        }

        function startGame() {
            resize();
            init();
            gameState = 'playing';
            gameContainer.classList.add('playing');
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
        }

        // Tuş kontrolü - takılma sorunu çözümü
        function setupButton(btn, isUp) {
            const startHandler = (e) => {
                e.preventDefault();
                e.stopPropagation();

                if (gameState === 'start' || gameState === 'gameover') {
                    startGame();
                    return;
                }

                btn.classList.add('active');
                if (isUp) {
                    isUpPressed = true;
                    isDownPressed = false;  // Karşı tuşu sıfırla
                    btnDown.classList.remove('active');
                } else {
                    isDownPressed = true;
                    isUpPressed = false;  // Karşı tuşu sıfırla
                    btnUp.classList.remove('active');
                }
            };

            const endHandler = (e) => {
                e.preventDefault();
                e.stopPropagation();
                btn.classList.remove('active');
                if (isUp) isUpPressed = false;
                else isDownPressed = false;
            };

            // Touch events
            btn.addEventListener('touchstart', startHandler, {passive: false});
            btn.addEventListener('touchend', endHandler, {passive: false});
            btn.addEventListener('touchcancel', endHandler, {passive: false});

            // Mouse events
            btn.addEventListener('mousedown', startHandler);
            btn.addEventListener('mouseup', endHandler);
            btn.addEventListener('mouseleave', endHandler);
        }

        setupButton(btnUp, true);
        setupButton(btnDown, false);

        startScreen.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startGame();
        }, {passive: false});

        startScreen.addEventListener('mousedown', (e) => {
            e.preventDefault();
            startGame();
        });

        gameOverScreen.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startGame();
        }, {passive: false});

        gameOverScreen.addEventListener('mousedown', (e) => {
            e.preventDefault();
            startGame();
        });

        window.addEventListener('resize', () => {
            resize();
            if (gameState === 'playing') {
                signal.x = canvas.width * 0.15;
            }
        });

        // Klavye kontrolü - takılma çözümü
        window.addEventListener('keydown', (e) => {
            if (e.repeat) return;

            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                isUpPressed = true;
                isDownPressed = false;  // Karşıyı kapat
                btnUp.classList.add('active');
                btnDown.classList.remove('active');
            } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
                isDownPressed = true;
                isUpPressed = false;  // Karşıyı kapat
                btnDown.classList.add('active');
                btnUp.classList.remove('active');
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
                isUpPressed = false;
                btnUp.classList.remove('active');
            } else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') {
                isDownPressed = false;
                btnDown.classList.remove('active');
            }
        });

        init();
        gameLoop();
    </script>
</body>
</html>
